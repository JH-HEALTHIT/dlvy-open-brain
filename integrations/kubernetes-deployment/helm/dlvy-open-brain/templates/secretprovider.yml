apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "dlvy-open-brain.fullname" . }}
  labels:
    {{- include "dlvy-open-brain.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    clientID: {{ .Values.workloadIdentity.clientId }}
    keyvaultName: {{ .Values.keyVault.name }}
    tenantId: {{ .Values.keyVault.tenantId }}
    objects: |
      array:
        {{- range .Values.keyVault.secrets }}
        - |
          objectName: {{ . }}
          objectType: secret
        {{- end }}
  secretObjects:
    - secretName: {{ include "dlvy-open-brain.fullname" . }}
      type: Opaque
      data:
        {{- range .Values.keyVault.mapping }}
        - objectName: {{ .secretName }}
          key: {{ .envVarName }}
        {{- end }}
  # Syncs Key Vault secrets into a Kubernetes secret so they can be
  # injected as environment variables via envFrom in the CronJob pod.
